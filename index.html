<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Remoover</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22><path d=%22m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --s1:#0f0f0f;
  --s2:#161616;
  --s3:#1e1e1e;
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.16);
  --t1:#ffffff;
  --t2:rgba(255,255,255,0.6);
  --t3:rgba(255,255,255,0.35);
  --green:#3ddc84;
  --red:#ff4f4f;
  --blue:#4f9fff;
}
body{background:var(--bg);color:var(--t1);font-family:'Geist',sans-serif;overflow-x:hidden}
.serif{font-family:'Instrument Serif',serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;font-family:'Geist',sans-serif;font-weight:500;font-size:14px;cursor:pointer;transition:all .15s ease}
.btn-white{background:#fff;color:#000;padding:12px 28px}
.btn-white:hover{background:#e8e8e8;transform:translateY(-1px)}
.btn-white:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--t2);border:1px solid var(--b2);padding:11px 24px}
.btn-outline:hover{background:var(--s2);color:var(--t1);border-color:var(--b3)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-danger{background:rgba(255,79,79,.1);color:var(--red);border:1px solid rgba(255,79,79,.2);padding:9px 18px;font-size:13px}
.btn-danger:hover{background:rgba(255,79,79,.15)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;overflow:hidden}
.card:hover{border-color:var(--b2);transition:border-color .2s}
.input{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 15px;color:var(--t1);font-family:'Geist',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .15s}
.input:focus{border-color:rgba(255,255,255,.25)}
.input::placeholder{color:var(--t3)}
.checker{background-image:linear-gradient(45deg,#1c1c1c 25%,transparent 25%),linear-gradient(-45deg,#1c1c1c 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1c1c1c 75%),linear-gradient(-45deg,transparent 75%,#1c1c1c 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0;background-color:#141414}
.upload-zone{border:1px solid var(--b2);border-radius:20px;transition:all .2s ease;cursor:pointer;background:var(--s1)}
.upload-zone:hover,.upload-zone.drag{border-color:rgba(255,255,255,.3);background:var(--s2)}
.upload-zone.drag{transform:scale(1.005)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fa{animation:fadeUp .4s ease both}
.fa1{animation:fadeUp .4s .08s ease both}
.fa2{animation:fadeUp .4s .16s ease both}
.shake{animation:shake .4s ease}
.spin{animation:spin 1s linear infinite}
.pulse-anim{animation:pulse 2s ease infinite}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--s2);color:var(--t2)}
.nav-item.active{background:var(--s2);color:var(--t1)}
.stat{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:22px;transition:all .15s}
.stat:hover{border-color:var(--b2);transform:translateY(-1px)}
.tbl th{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);padding:10px 16px;border-bottom:1px solid var(--b1);text-align:left}
.tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.025);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .15s;border:2px solid transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:rgba(255,255,255,.7);transform:scale(1.15);box-shadow:0 0 0 2px rgba(255,255,255,.2)}
.ring circle{transition:stroke-dashoffset .1s linear;transform:rotate(-90deg);transform-origin:50% 50%}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite}
.scroll-x{overflow-x:auto}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import { Upload, Download, Sparkles, X, Image as Img, RefreshCw, Check, Lock, LayoutDashboard, Settings, LogOut, Activity, Clock, Globe, TrendingUp, BarChart2, AlertCircle, Shield, Eye, ChevronRight, Users, MousePointer, Timer, FileImage, Trash2 } from 'https://esm.sh/lucide-react@0.344.0';
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ═══ ANALYTICS ═══ */
const AK = 'bgrm_v2';
const defaultData = () => ({ visitors:[], uploads:[], pageviews:[] });
const getDB = () => { try { const r=localStorage.getItem(AK); return r?JSON.parse(r):defaultData(); } catch { return defaultData(); } };
const saveDB = db => { try { localStorage.setItem(AK,JSON.stringify(db)); } catch {} };
const getOrCreateVid = () => { const k='bgrm_vid'; let id=localStorage.getItem(k); if(!id){id=Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem(k,id);} return id; };

const trackVisit = () => {
  const db=getDB(); const vid=getOrCreateVid(); const ts=Date.now();
  const ex=db.visitors.find(v=>v.id===vid);
  const isNew=!ex||(ts-(ex.lastTs||0))>1800000;
  if(!ex){db.visitors.push({id:vid,firstTs:ts,lastTs:ts,sessions:1,lang:navigator.language||'?',tz:Intl.DateTimeFormat().resolvedOptions().timeZone||'?',w:window.innerWidth,h:window.innerHeight,ref:document.referrer||'direct',ua:navigator.userAgent});}
  else{ex.lastTs=ts;if(isNew)ex.sessions=(ex.sessions||1)+1;}
  db.pageviews.push({ts,path:location.pathname,vid});
  db.visitors=db.visitors.slice(-2000); db.pageviews=db.pageviews.slice(-5000);
  saveDB(db);
};

const trackUpload = (name,size) => { const db=getDB(); const id=Date.now(); db.uploads.push({id,ts:Date.now(),name,size:Math.round(size/1024),status:'processing',dur:null}); db.uploads=db.uploads.slice(-500); saveDB(db); return id; };
const finishUpload = (id,ok,dur) => { const db=getDB(); const u=db.uploads.find(x=>x.id===id); if(u){u.status=ok?'done':'error';u.dur=dur;} saveDB(db); };

/* ═══ ROUTING ═══ */
const useRoute = () => {
  const [path,setPath]=useState(location.pathname);
  useEffect(()=>{ const h=()=>setPath(location.pathname); window.addEventListener('popstate',h); return()=>window.removeEventListener('popstate',h); },[]);
  const go = to => { history.pushState({},''  ,to); setPath(to); };
  return {path,go};
};

/* ═══ AI CACHE ═══ */
let cachedRmBg=null;

/* ═══ ROOT ═══ */
const App = () => {
  const {path,go}=useRoute();
  useEffect(()=>{ trackVisit(); },[]);
  if(path.startsWith('/admin')) return <AdminShell go={go}/>;
  return <MainApp go={go}/>;
};

/* ═══ MAIN APP ═══ */
const MainApp = ({go}) => {
  const [preview,setPreview]=useState(null);
  const [canvas,setCanvas]=useState(null);
  const [processing,setProcessing]=useState(false);
  const [err,setErr]=useState(null);
  const [fileName,setFileName]=useState('image');
  const [realP,setRealP]=useState(0);
  const [visP,setVisP]=useState(0);
  const [bg,setBg]=useState('transparent');
  const [uploadId,setUploadId]=useState(null);
  const [startTs,setStartTs]=useState(null);
  const [viewMode,setViewMode]=useState('split');

  useEffect(()=>{
    if(visP<realP){ const t=setInterval(()=>setVisP(p=>p<realP?Math.min(p+2,realP):p),12); return()=>clearInterval(t); }
  },[realP,visP]);

  const onSelect=useCallback((file,prev)=>{
    setFileName(file.name.replace(/\.[^.]+$/,''));
    setPreview(prev);setCanvas(null);setProcessing(true);setErr(null);setRealP(0);setVisP(0);
    const id=trackUpload(file.name,file.size); setUploadId(id); setStartTs(Date.now());
  },[]);

  const onDone=useCallback(c=>{
    setCanvas(c);setRealP(100);
    const dur=startTs?Math.round((Date.now()-startTs)/1000):null;
    if(uploadId)finishUpload(uploadId,true,dur);
    setTimeout(()=>setProcessing(false),600);
  },[uploadId,startTs]);

  const onErr=useCallback(m=>{
    setErr(m);setProcessing(false);
    if(uploadId)finishUpload(uploadId,false,null);
  },[uploadId]);

  const reset=()=>{setPreview(null);setCanvas(null);setErr(null);setRealP(0);setVisP(0);};

  const colors=[
    {v:'transparent',bg:'repeating-conic-gradient(#222 0% 25%,#111 0% 50%) 0 0/10px 10px'},
    {v:'#ffffff'},{v:'#000000'},{v:'#0a0a0a'},{v:'#1a1a2e'},{v:'#0f3460'},
    {v:'#e94560'},{v:'#f97316'},{v:'#fbbf24'},{v:'#22c55e'},{v:'#06b6d4'},{v:'#a855f7'},
  ];

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
        <div style={{position:'absolute',width:700,height:700,background:'radial-gradient(circle,rgba(255,255,255,0.022) 0%,transparent 70%)',top:'-15%',left:'25%',borderRadius:'50%'}}/>
      </div>

      {/* Header */}
      <header style={{position:'relative',zIndex:1,padding:'20px 48px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--b1)'}}>
        <span style={{fontFamily:"'Instrument Serif',serif",fontSize:22,letterSpacing:'-0.01em'}}>BG Remoover</span>
      </header>

      <main style={{flex:1,position:'relative',zIndex:1,padding:'72px 48px',maxWidth:1100,margin:'0 auto',width:'100%'}}>

        {/* Hero */}
        {!preview&&!processing&&(
          <div style={{textAlign:'center',marginBottom:60}} className="fa">
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:'clamp(52px,7vw,96px)',lineHeight:1.02,letterSpacing:'-0.03em',marginBottom:0,fontWeight:400,color:'white'}}>
              Remove any background.
            </h1>
          </div>
        )}

        {/* Error */}
        {err&&(
          <div className="card fa" style={{borderColor:'rgba(255,79,79,.25)',background:'rgba(255,79,79,.05)',padding:16,display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
            <AlertCircle size={17} color="var(--red)" style={{flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:'#ff8080',marginBottom:2}}>Processing failed</div>
              <div style={{fontSize:12,color:'rgba(255,128,128,.5)'}}>{err}</div>
            </div>
            <button onClick={()=>setErr(null)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:4}}><X size={15}/></button>
          </div>
        )}

        {/* Upload */}
        {!preview&&!processing&&(
          <div className="fa1"><Uploader onSelect={onSelect}/></div>
        )}

        {/* Processing */}
        {processing&&(
          <div className="fa" style={{display:'flex',justifyContent:'center'}}>
            <div className="card" style={{padding:64,textAlign:'center',maxWidth:460,width:'100%'}}>
              <div style={{position:'relative',width:140,height:140,margin:'0 auto 32px'}}>
                <svg className="ring" width="140" height="140">
                  <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
                  <circle cx="70" cy="70" r="60" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round"
                    strokeDasharray={`${2*Math.PI*60}`}
                    strokeDashoffset={`${2*Math.PI*60*(1-visP/100)}`}/>
                </svg>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{fontFamily:"'Instrument Serif',serif",fontSize:40}}>{visP}<span style={{fontSize:20,color:'var(--t3)'}}>%</span></span>
                </div>
              </div>
              <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24,marginBottom:8}}>
                {visP===100?'Finishing up':'Removing background'}
              </div>
              <div style={{color:'var(--t3)',fontSize:14}}>AI is working on your image</div>
              <div style={{marginTop:24,height:2,background:'rgba(255,255,255,.06)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.max(visP,1)}%`,background:'white',borderRadius:99,transition:'width .1s ease'}}/>
              </div>
            </div>
          </div>
        )}

        {/* Result */}
        {preview&&!processing&&(
          <div className="fa" style={{display:'flex',flexDirection:'column',gap:20}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
              <div style={{display:'flex',gap:6}}>
                {[['split','Split view'],['single','Result only']].map(([v,l])=>(
                  <button key={v} className={`btn btn-sm ${viewMode===v?'btn-white':'btn-outline'}`} style={{fontSize:12}} onClick={()=>setViewMode(v)}>{l}</button>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                {canvas&&<DLBtn canvas={canvas} name={fileName} bg={bg}/>}
                <button className="btn btn-outline btn-sm" onClick={reset}><RefreshCw size={13}/>New image</button>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:viewMode==='split'?'1fr 1fr':'1fr',gap:16}}>
              {viewMode==='split'&&(
                <div className="card" style={{overflow:'hidden'}}>
                  <div style={{padding:'11px 16px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',gap:8}}>
                    <Img size={13} color="var(--t3)"/>
                    <span style={{fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em'}}>Original</span>
                  </div>
                  <div style={{padding:24,minHeight:360,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
                    <img src={preview} alt="Original" style={{maxWidth:'100%',maxHeight:480,borderRadius:10,boxShadow:'0 8px 40px rgba(0,0,0,.6)'}}/>
                  </div>
                </div>
              )}
              <div className="card" style={{border:'1px solid rgba(255,255,255,.1)',overflow:'hidden'}}>
                <div style={{padding:'11px 16px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',gap:8}}>
                  <Sparkles size={13} color="white"/>
                  <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}}>Result</span>
                </div>
                <div style={{padding:'11px 16px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em',marginRight:4}}>Background</span>
                  {colors.map(c=>(
                    <button key={c.v} title={c.v} className={`sw ${bg===c.v?'on':''}`} onClick={()=>setBg(c.v)} style={{background:c.bg||c.v,border:'2px solid rgba(255,255,255,.1)'}}>
                      {bg===c.v&&c.v!=='transparent'&&<Check size={12} color="white" style={{filter:'drop-shadow(0 1px 2px rgba(0,0,0,.8))'}}/>}
                    </button>
                  ))}
                </div>
                <div className={bg==='transparent'?'checker':''} style={{padding:24,minHeight:360,display:'flex',alignItems:'center',justifyContent:'center',background:bg!=='transparent'?bg:undefined}}>
                  {canvas
                    ?<img src={canvas.toDataURL('image/png')} alt="Result" style={{maxWidth:'100%',maxHeight:480,borderRadius:10,boxShadow:'0 8px 40px rgba(0,0,0,.6)'}}/>
                    :<div style={{textAlign:'center',color:'var(--t3)'}}><X size={36} style={{margin:'0 auto 8px',opacity:.3,display:'block'}}/><p style={{fontSize:13}}>Processing failed</p></div>
                  }
                </div>
              </div>
            </div>
          </div>
        )}

        {preview&&processing&&<Processor preview={preview} onDone={onDone} onErr={onErr} onP={setRealP}/>}
      </main>
    </div>
  );
};

const Uploader = ({onSelect}) => {
  const [drag,setDrag]=useState(false);
  const ref=useRef(null);
  const onDrag=e=>{e.preventDefault();setDrag(e.type==='dragenter'||e.type==='dragover');};
  const onDrop=e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])proc(e.dataTransfer.files[0]);};
  const proc=f=>{if(!f.type.match('image.*'))return alert('Please select an image');const r=new FileReader();r.onload=e=>onSelect(f,e.target.result);r.readAsDataURL(f);};
  return (
    <div className={`upload-zone ${drag?'drag':''}`} style={{padding:'90px 40px',textAlign:'center'}} onDragEnter={onDrag} onDragLeave={onDrag} onDragOver={onDrag} onDrop={onDrop} onClick={()=>ref.current.click()}>
      <input type="file" ref={ref} style={{display:'none'}} accept="image/png,image/jpeg,image/webp" onChange={e=>e.target.files[0]&&proc(e.target.files[0])}/>
      <div style={{width:72,height:72,background:'rgba(255,255,255,.06)',border:'1px solid var(--b2)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px'}}>
        <Upload size={30} color="white" strokeWidth={1.5}/>
      </div>
      <p style={{fontSize:18,color:'white',fontWeight:300,marginBottom:4}}>
        Drop an image here
      </p>
      <p style={{fontSize:14,color:'var(--t3)'}}>or <span style={{color:'white',textDecoration:'underline',textUnderlineOffset:3,cursor:'pointer'}}>click to browse</span></p>
    </div>
  );
};

const Processor = ({preview,onDone,onErr,onP}) => {
  useEffect(()=>{
    (async()=>{
      try {
        const res=await fetch(preview); const blob=await res.blob();
        const opts={progress:(k,c,t)=>onP(t>0?Math.round(c/t*100):0),debug:false,proxyToWorker:true,model:'medium'};
        if(!cachedRmBg){onP(1);const{removeBackground}=await import('https://esm.sh/@imgly/background-removal@1.4.5');cachedRmBg=removeBackground;}
        const out=await cachedRmBg(blob,opts);
        const bm=await createImageBitmap(out);
        const c=document.createElement('canvas');c.width=bm.width;c.height=bm.height;c.getContext('2d').drawImage(bm,0,0);
        onDone(c);
      } catch(e){onErr('Failed to process. '+(e.message||''));}
    })();
  },[]);
  return null;
};

const DLBtn = ({canvas,name,bg}) => {
  const dl=()=>{
    const tmp=document.createElement('canvas');tmp.width=canvas.width;tmp.height=canvas.height;
    const ctx=tmp.getContext('2d');
    if(bg!=='transparent'){ctx.fillStyle=bg;ctx.fillRect(0,0,tmp.width,tmp.height);}
    ctx.drawImage(canvas,0,0);
    const a=document.createElement('a');a.download=`${name}-nobg.png`;a.href=tmp.toDataURL('image/png');a.click();
  };
  return <button className="btn btn-white btn-sm" onClick={dl}><Download size={14}/>Download PNG</button>;
};

/* ═══ ADMIN SHELL ═══ */
const AdminShell = ({go}) => {
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem('bgrm_adm')==='1');
  if(!authed)return <AdminLogin onAuth={()=>{sessionStorage.setItem('bgrm_adm','1');setAuthed(true);}} go={go}/>;
  return <AdminPanel go={go} onOut={()=>{sessionStorage.removeItem('bgrm_adm');setAuthed(false);}}/>;
};

const AdminLogin = ({onAuth,go}) => {
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  const submit=()=>{if(pw==='Hundkatt'){onAuth();}else{setErr(true);setShake(true);setTimeout(()=>setShake(false),500);}};
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className={`card fa ${shake?'shake':''}`} style={{width:'100%',maxWidth:360,padding:44}}>
        <div style={{textAlign:'center',marginBottom:32}}>

/* ═══ HELPERS ═══ */
const fmtTime=ts=>new Date(ts).toLocaleString();
const fmtAgo=ts=>{const s=Math.floor((Date.now()-ts)/1000);if(s<60)return`${s}s ago`;if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`;};
const parseUA=ua=>{if(!ua)return'Unknown';if(/iPhone|iPad/.test(ua))return'iOS';if(/Android/.test(ua))return'Android';if(/Mac/.test(ua))return'macOS';if(/Windows/.test(ua))return'Windows';if(/Linux/.test(ua))return'Linux';return'Other';};
const parseBrowser=ua=>{if(!ua)return'Unknown';if(/Firefox\//.test(ua))return'Firefox';if(/Edg\//.test(ua))return'Edge';if(/Chrome\//.test(ua))return'Chrome';if(/Safari\//.test(ua))return'Safari';return'Other';};
const parseRef=ref=>{if(!ref||ref==='direct')return'Direct';try{return new URL(ref).hostname.replace('www.','');}catch{return ref;}};
const countBy=(arr,fn)=>{const m={};arr.forEach(x=>{const k=fn(x);m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
const last24h=ts=>Date.now()-ts<86400000;
const last7d=ts=>Date.now()-ts<604800000;
const last30d=ts=>Date.now()-ts<2592000000;

/* ═══ DASHBOARD ═══ */
const DashTab = ({db}) => {
  const vs=db.visitors||[]; const ups=db.uploads||[]; const pvs=db.pageviews||[];
  const totalV=vs.length;
  const v24=vs.filter(v=>last24h(v.lastTs)).length;
  const v7=vs.filter(v=>last7d(v.lastTs)).length;
  const totalS=vs.reduce((a,v)=>a+(v.sessions||1),0);
  const totalU=ups.length;
  const doneU=ups.filter(u=>u.status==='done').length;
  const rate=totalU>0?Math.round(doneU/totalU*100):0;
  const withDur=ups.filter(u=>u.dur>0);
  const avgDur=withDur.length?Math.round(withDur.reduce((a,u)=>a+u.dur,0)/withDur.length):0;

  const last7Days=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);
    const label=d.toLocaleDateString('en',{weekday:'short'});
    const uCount=ups.filter(u=>{const d2=new Date(u.ts);d2.setHours(0,0,0,0);return d2.getTime()===d.getTime();}).length;
    const vCount=vs.filter(v=>{const d2=new Date(v.lastTs);d2.setHours(0,0,0,0);return d2.getTime()===d.getTime();}).length;
    return{label,uCount,vCount};
  }).reverse();

  const maxVal=Math.max(...last7Days.map(d=>Math.max(d.uCount,d.vCount)),1);
  const recent=[...ups].reverse().slice(0,8);

  const stats=[
    {label:'Total Visitors',value:totalV,sub:`${v24} today · ${v7} this week`,icon:Users},
    {label:'Total Sessions',value:totalS,sub:`avg ${totalV?Math.round(totalS/totalV*10)/10:0} per visitor`,icon:MousePointer},
    {label:'Images Processed',value:totalU,sub:`${doneU} successful`,icon:FileImage},
    {label:'Success Rate',value:`${rate}%`,sub:avgDur?`avg ${avgDur}s processing time`:'no data yet',icon:Activity},
    {label:'Page Views',value:pvs.length,sub:'all time',icon:Eye},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:28}}>
      <div>
        <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:28,fontWeight:400,marginBottom:4}}>Dashboard</h2>
        <p style={{color:'var(--t3)',fontSize:14}}>{totalV} unique visitors tracked in this browser</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:14}}>
        {stats.map((s,i)=>(
          <div key={i} className="stat fa" style={{animationDelay:`${i*.06}s`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <span style={{fontSize:10,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em'}}>{s.label}</span>
              <s.icon size={14} color="var(--t3)"/>
            </div>
            <div style={{fontFamily:"'Instrument Serif',serif",fontSize:36,lineHeight:1,marginBottom:6}}>{s.value}</div>
            <div style={{fontSize:12,color:'var(--t3)'}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* 7-day chart */}
      <div className="card">
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:600}}>Activity — Last 7 Days</span>
          <div style={{display:'flex',gap:16,fontSize:11,color:'var(--t3)'}}>
            <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:3,background:'white',borderRadius:2,display:'inline-block'}}/>Visitors</span>
            <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:3,background:'rgba(255,255,255,.3)',borderRadius:2,display:'inline-block'}}/>Uploads</span>
          </div>
        </div>
        <div style={{padding:'24px 24px 16px',display:'flex',alignItems:'flex-end',gap:12,height:200}}>
          {last7Days.map((d,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,height:'100%',justifyContent:'flex-end'}}>
              <div style={{width:'100%',display:'flex',gap:3,alignItems:'flex-end',flex:1,justifyContent:'center'}}>
                <div title={`${d.vCount} visitors`} style={{width:'42%',height:`${(d.vCount/maxVal)*100}%`,minHeight:d.vCount>0?3:0,background:'white',borderRadius:'3px 3px 0 0',opacity:.85}}/>
                <div title={`${d.uCount} uploads`} style={{width:'42%',height:`${(d.uCount/maxVal)*100}%`,minHeight:d.uCount>0?3:0,background:'rgba(255,255,255,.3)',borderRadius:'3px 3px 0 0'}}/>
              </div>
              <span style={{fontSize:11,color:'var(--t3)'}}>{d.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>Recent Uploads</span></div>
          {recent.length===0
            ?<div style={{padding:32,textAlign:'center',color:'var(--t3)',fontSize:13}}>No uploads yet</div>
            :recent.map(u=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.025)'}}>
                <FileImage size={14} color="var(--t3)" style={{flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div>
                  <div style={{fontSize:11,color:'var(--t3)',marginTop:1}}>{u.size} KB · {fmtAgo(u.ts)}{u.dur?` · ${u.dur}s`:''}</div>
                </div>
                <span className="dot" style={{background:u.status==='done'?'var(--green)':u.status==='error'?'var(--red)':'var(--t3)'}}/>
              </div>
          ))}
        </div>
        <div className="card">
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>Traffic Sources</span></div>
          {vs.length===0
            ?<div style={{padding:32,textAlign:'center',color:'var(--t3)',fontSize:13}}>No visitor data yet</div>
            :countBy(vs,v=>parseRef(v.ref)).slice(0,7).map(([ref,cnt])=>{
              const pct=Math.round(cnt/vs.length*100);
              return (
                <div key={ref} style={{padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.025)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:13}}>
                    <span>{ref}</span><span style={{color:'var(--t3)'}}>{cnt} ({pct}%)</span>
                  </div>
                  <div style={{height:2,background:'rgba(255,255,255,.06)',borderRadius:99,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:'rgba(255,255,255,.5)',borderRadius:99}}/>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
};

/* ═══ VISITORS TAB ═══ */
const VisitorsTab = ({db}) => {
  const vs=db.visitors||[];
  const [filter,setFilter]=useState('all');
  const filtered=useMemo(()=>{
    if(filter==='24h')return vs.filter(v=>last24h(v.lastTs));
    if(filter==='7d')return vs.filter(v=>last7d(v.lastTs));
    if(filter==='30d')return vs.filter(v=>last30d(v.lastTs));
    return vs;
  },[vs,filter]);
  const sorted=[...filtered].sort((a,b)=>b.lastTs-a.lastTs);
  const platforms=countBy(vs,v=>parseUA(v.ua));
  const browsers=countBy(vs,v=>parseBrowser(v.ua));
  const langs=countBy(vs,v=>(v.lang||'?').split('-')[0].toUpperCase()).slice(0,6);
  const tzs=countBy(vs,v=>v.tz||'Unknown').slice(0,6);
  const total=vs.length||1;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:24}}>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>

          <p style={{color:'var(--t3)',fontSize:14}}>{vs.length} unique visitors tracked</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['all','All'],['30d','30d'],['7d','7d'],['24h','Today']].map(([v,l])=>(
            <button key={v} className={`btn btn-sm ${filter===v?'btn-white':'btn-outline'}`} style={{fontSize:12}} onClick={()=>setFilter(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {[[platforms,'Platforms'],[browsers,'Browsers'],[langs,'Languages']].map(([data,title])=>(
          <div key={title} className="card">
            <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>{title}</span></div>
            <div style={{padding:'8px 0'}}>
              {data.slice(0,6).map(([k,c])=>{
                const pct=Math.round(c/total*100);
                return (
                  <div key={k} style={{padding:'8px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
                    <span style={{fontSize:13}}>{k}</span>
                    <div style={{display:'flex',alignItems:'center',gap:8,flex:1,justifyContent:'flex-end'}}>
                      <div style={{width:70,height:2,background:'rgba(255,255,255,.06)',borderRadius:99,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${pct}%`,background:'white',borderRadius:99}}/>
                      </div>
                      <span style={{fontSize:12,color:'var(--t3)',width:30,textAlign:'right'}}>{pct}%</span>
                    </div>
                  </div>
                );
              })}
              {data.length===0&&<div style={{padding:'16px 18px',fontSize:13,color:'var(--t3)'}}>No data yet</div>}
            </div>
          </div>
        ))}
      </div>

      {tzs.length>0&&(
        <div className="card">
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>Timezones</span></div>
          <div style={{padding:'8px 0',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))'}}>
            {tzs.map(([tz,c])=>{
              const pct=Math.round(c/total*100);
              return (
                <div key={tz} style={{padding:'10px 18px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:13}}>
                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>{tz}</span>

                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="card">
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:600}}>Visitor Log</span>
          <span style={{fontSize:12,color:'var(--t3)'}}>{filtered.length} records</span>
        </div>
        <div className="scroll-x">

  );

    <div style={{display:'flex',flexDirection:'column',gap:24,maxWidth:500}}>
      <div>
        <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:28,fontWeight:400,marginBottom:4}}>Settings</h2>
        <p style={{color:'var(--t3)',fontSize:14}}>Manage data and preferences</p>
      </div>
      <div className="card">
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>Analytics Storage</span></div>
        <div style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['Visitors',(db.visitors||[]).length],['Uploads',(db.uploads||[]).length],['Page Views',(db.pageviews||[]).length],['Storage',`${Math.round(dbSize/1024)} KB`]].map(([k,v])=>(
              <div key={k} style={{background:'var(--s2)',borderRadius:10,padding:'12px 16px',border:'1px solid var(--b1)'}}>
                <div style={{fontSize:10,color:'var(--t3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>{k}</div>
                <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24}}>{v}</div>
              </div>
            ))}
          </div>
          <p style={{color:'var(--t3)',fontSize:13,lineHeight:1.7}}>All data lives in your browser's localStorage. Nothing is sent to any server.</p>
          <button className={`btn ${cleared?'btn-outline':'btn-danger'}`} style={{alignSelf:'flex-start',gap:8}} onClick={clear}>
            {cleared?<><Check size={14}/>Cleared!</>:<><Trash2 size={14}/>Clear all data</>}
          </button>
        </div>
      </div>
      <div className="card">
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--b1)'}}><span style={{fontSize:13,fontWeight:600}}>App Info</span></div>
        <div style={{padding:'4px 0'}}>
          {[['Version','v2.0'],['AI Model','@imgly/background-removal 1.4.5'],['Admin path','/admin'],['Data store','Browser localStorage']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 18px',borderBottom:'1px solid rgba(255,255,255,.025)',fontSize:13}}>
              <span style={{color:'var(--t3)'}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
